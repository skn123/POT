name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
  create:
    branches:
      - 'master'
    tags:
      - '**'

env:
  PY_VERSION: "3.13"

jobs:

  Lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:


    - name: Checking Out Repository
      uses: actions/checkout@v7
      with:
        submodules: true
    # Install Python & Packages
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PY_VERSION }}
    - run: which python
    - name: Lint with pre-commit
      run: |
        pip install pre-commit
        pre-commit install --install-hooks
        pre-commit run --all-files

  build_from_source:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PY_VERSION }}
    - name: Build from source
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install cython numpy
        python setup.py sdist bdist_wheel
        pip install dist/*.tar.gz

  doctests:

    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'no ci')"
    steps:
    - name: Free Disk Space (Ubuntu)
      uses: insightsengineering/disk-space-reclaimer@v1
      with:
        android: true
        dotnet: true
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PY_VERSION }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install -r .github/requirements_doctests.txt
        pip install pytest pytest-cov
    - name: Install POT
      run: |
        pip install -e .
    - name: Run tests
      run: |
        python -m pytest -v ot/ test/conftest.py --doctest-modules --color=yes --cov=./ --cov-report=xml

  linux-minimal:

    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'no ci')"
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PY_VERSION }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install pytest pytest-cov
    - name: Install POT
      run: |
        pip install -e .
    - name: Run tests
      run: |
        python -m pytest --durations=20 -v test/ ot/ --color=yes --cov=./ --cov-report=xml

  linux:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'no ci')"
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    # - name: Free Disk Space (Ubuntu)
    #   uses: insightsengineering/disk-space-reclaimer@v1
    #   with:
    #     android: true
    #     dotnet: true
    - uses: actions/checkout@v7
      with:
        submodules: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install POT
      run: |
        pip install -e .
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install -r .github/requirements_no_backend.txt
        pip install pytest pytest-cov
    - name: test POT import
      run: |
        python -c "import ot; print(ot.__version__)"
    - name: Run tests
      run: |
        python -m pytest --durations=20 -v test/ --color=yes --cov=./ --cov-report=xml
    - name: Upload coverage reports to Codecov with GitHub Action
      uses: codecov/codecov-action@v4

  linux-torch:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'no ci')"

